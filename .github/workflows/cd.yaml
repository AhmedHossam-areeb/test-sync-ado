name: Sync GitHub to Azure DevOps

on:
  push:
    branches:
      - "**"
      - "!develop"
      - "!test"
      - "!uat"
      - "!master"
    tags:
      - "*"
  delete:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: git-sync
  cancel-in-progress: false

jobs:
  github_to_ado:
    name: Sync GitHub to Azure DevOps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout all refs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate and debug secrets
        env:
          ADO_REMOTE_URL: ${{ secrets.ADO_REMOTE_URL }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: |
          set -euo pipefail

          echo "=== Secret presence ==="
          if [ -z "${ADO_REMOTE_URL}" ]; then echo "[ERROR] ADO_REMOTE_URL is empty"; exit 1; fi
          if [ -z "${ADO_PAT}" ];       then echo "[ERROR] ADO_PAT is empty";       exit 1; fi
          echo "ADO_REMOTE_URL set: yes"
          echo "ADO_PAT set:        yes"

          echo "=== ADO_REMOTE_URL diagnostics ==="
          # Print raw byte count and visible content (PAT never printed)
          echo "Raw byte length : $(printf '%s' "${ADO_REMOTE_URL}" | wc -c)"
          echo "Trimmed value   : $(printf '%s' "${ADO_REMOTE_URL}" | tr -d '[:space:]')"

          # Validate URL starts with https://
          CLEAN_URL="$(printf '%s' "${ADO_REMOTE_URL}" | tr -d '[:space:]')"
          if [[ "${CLEAN_URL}" != https://* ]]; then
            echo "[ERROR] ADO_REMOTE_URL must start with https://"
            exit 1
          fi

          # Validate expected ADO hostname
          HOSTNAME="$(echo "${CLEAN_URL}" | awk -F/ '{print $3}')"
          echo "Parsed hostname : ${HOSTNAME}"
          if [[ "${HOSTNAME}" != *dev.azure.com* ]] && [[ "${HOSTNAME}" != *visualstudio.com* ]]; then
            echo "[WARN] Hostname does not look like a standard Azure DevOps URL."
          fi

          echo "=== Git version ==="
          git --version

          echo "=== DNS resolution ==="
          nslookup "${HOSTNAME}" || echo "[WARN] nslookup failed for ${HOSTNAME}"

          echo "=== HTTPS connectivity ==="
          curl -fsSL --max-time 10 -o /dev/null -w "HTTP status: %{http_code}\n" "${CLEAN_URL}" \
            || echo "[INFO] HTTPS probe returned non-200 (auth required is expected, verify no connection error above)"

          echo "=== Git connectivity via PAT (Authorization header) ==="
          # Base64-encode :PAT (empty user, PAT as password - Azure DevOps recommended)
          BASE64_PAT="$(printf ':%s' "${ADO_PAT}" | base64 -w 0)"
          git -c http.extraheader="Authorization: Basic ${BASE64_PAT}" ls-remote "${CLEAN_URL}" HEAD \
            && echo "[OK] git ls-remote succeeded" \
            || { echo "[ERROR] git ls-remote failed - check PAT permissions (Code Read+Write required)"; exit 1; }

      - name: Push all branches and tags to Azure DevOps
        env:
          ADO_REMOTE_URL: ${{ secrets.ADO_REMOTE_URL }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: |
          set -euo pipefail
          CLEAN_URL="$(printf '%s' "${ADO_REMOTE_URL}" | tr -d '[:space:]')"
          # Base64-encode :PAT and pass via Authorization header.
          # This avoids URL-parsing failures when the PAT contains special characters
          # such as +, /, = which are common in Azure DevOps PATs.
          BASE64_PAT="$(printf ':%s' "${ADO_PAT}" | base64 -w 0)"

          git remote remove ado 2>/dev/null || true
          git remote add ado "${CLEAN_URL}"

          git fetch origin --prune --tags
          git -c http.extraheader="Authorization: Basic ${BASE64_PAT}" push ado +refs/remotes/origin/*:refs/heads/* --prune
          git -c http.extraheader="Authorization: Basic ${BASE64_PAT}" push ado +refs/tags/*:refs/tags/* --force
